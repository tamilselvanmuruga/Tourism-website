<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
       
        #di{
            border: 1px solid black;
            text-align: center;
            width: 300px;
            height: 200px;
            margin-left: 900px;
            margin-top: 400px;
        }
        button{
            margin-left: 280px;
        }
        i{
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div id="di">
        <button onclick="changei()">x</button>
    <h1>login success</h1>
    <i class="fa-solid fa-circle-check" style="color: #B197FC;"></i>
    <script>
        function changei(){
            document.getElementById('di').style.transition='2s'
            document.getElementById('di').style.opacity='0'
            document.getElementById('di').style.visibility='hidden'

        }
    </script>
</div>
</body>
</html>
