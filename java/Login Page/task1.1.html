<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
         #di{
            border: 1px solid black;
            text-align: center;
            width: 300px;
            height: 200px;
            margin-left: 900px;
            visibility: hidden;
        }
        .click{
            margin-left: 280px;
        }
        i{
            font-size: 40px;
        }
        #low{
            border: 1px solid black;
            width: 500px;
            height: 300px;
            text-align: center;
            margin-left:900px ;
            margin-top: 400px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="low">
        <h1>Login</h1>
        <input type="text" id='uname'placeholder="enter your username"><br><br>
        <input type="password" id='upass'placeholder="enter your password"><br><br>
        <button clas="bu" onclick="log()">login</button>
</div>
        <div id="di">
        <button  class='click'onclick="changei()">x</button>
    <h1>login success</h1>
    <i class="fa-solid fa-circle-check" style="color: #B197FC;"></i>
    </div>
        <script>
            reguser='abc'
            regpass='abc1234'
            function log(){
              let uname=document.getElementById('uname').value
              let lpass=document.getElementById('upass').value
               if(reguser == uname && lpass)
               {
                 document.getElementById('di').style.visibility='visible';
                 document.getElementById('low').style.visibility='hidden';
                }
                else{
                if(uname=" ")
                {
                 alert('user name is required')
                }
                else if(lpass=" ")
                {
                    alert('password is required')
                }
                else if(reguser!=uname)
                {
                    alert('user name is invalid')
                }
                else if(regpass!=lpass)
                {
                    alert('password is incorrect')
                }
            }
        }
     
        function changei(){
            document.getElementById('di').style.transition='2s'
            document.getElementById('di').style.opacity=0
            document.getElementById('di').style.visibility='hidden'
            document.getElementById('low').style.visibility='visible'
            document.getElementById('low').style.transition='2s'
            document.getElementById('low').style.opacity=1

        }

</script>
</body>
</html>
