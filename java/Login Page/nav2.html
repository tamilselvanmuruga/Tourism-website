<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
        }
        nav{
            background-color: black;
            color: white;
            height: 100vh;
            width: 120px;
        }
        ul{
            padding-top: 10px;
            font-size: 20px;
        }
        li{
            padding-top: 30px;
            padding-right: 30px;
            list-style: none;
        }
        button{
            margin-left: 90px;
            margin-top: 0px;
        }
    </style>
</head>
<body>
    <nav id="na">
    <h1>profile</h1>
    <button onclick="change()">x</button>
    <ul>
        <li>home</li>
        <li>about</li>
        <li>contact</li>
        <li>login</li>
    </ul>
    <script>
        function change(){
           document.getElementById('na').style.transitionDuration='3s'
           document.getElementById('na').style.opacity='0'
           document.getElementById('na').style.visibility='hidden'
           document.getElementById('na').style.transform='translatex(-100px)'
        }  
    </script>
    </nav>
</body>
</html>
